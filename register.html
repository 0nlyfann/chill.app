<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <div class="login-container">    
        <div class="login-card">
            <div class="chill">
            <img id="logo" src="image/movie-open.png" alt="">
            <img src="image/CHILL.png" alt="logo-chill id="logo-kedua">
        </div>                   
        <div class="welcome">
            <h3>Masuk</h3>  
            <p>selamat datang kembali!</p>
        </div>
        <form action="web-page.html">
            <div class="username-tag">
                <label for="username" >Username</label>
                <input type="text" id="username" placeholder="Masukkan Username" required>
            </div>
            <div class="password-tag">
                <label for="password">Kata Sandi</label>
                <input type="password" id="password" placeholder="Masukkan Kata Sandi" required>
                <img src="image/Vector (1).png" alt="mata">
            </div>


            <div class="password-tag">
                <label for="password">Konfirmasi Kata Sandi</label>
                <input type="password" id="password" placeholder="Masukkan Kata Sandi" required>
                <img src="image/Vector (1).png" alt="mata">
            </div>
            <div class="register">
                <p>sudah punya akun?<a href="login.html">Masuk</a>
            </div>




            <div class="tag-tombol">
                <button type="submit" class="masuk">Masuk</button>
                <p>Atau</p>
                
                
                <button class="google-login"> 
                    <img src="image/google.png" alt="logo-google">
                    <p><a href="google.com">Masuk dengan Google</a></p>
                </button>
                
            </div>
        </form>
        </div>       
    </div>            
</body>
</html>
