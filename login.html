<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-container">    
        <div class="login-card">
            <div class="chill">
            <img id="logo" src="/chill.app/image/Vector.png" alt="">
            <img src="/chill.app/image/CHILL.png" alt="logo-chill id="logo-kedua">
        </div>                   
        <div class="welcome">
            <h3>Masuk</h3>  
            <p>selamat datang kembali!</p>
        </div>
        <form action="/chill.app/web-page.html">
            <div class="username-tag">
                <label for="username" >Username</label>
                <input type="text" id="username" placeholder="Masukkan Username" required>
            </div>
            <div class="password-tag">
                <label for="password">Kata Sandi</label>
                <input type="password" id="password" placeholder="Masukkan Kata Sandi" required>
                <img src="/chill.app/image/Vector (1).png" alt="mata">
            </div>
            <div class="register">
                <p>Belum punya akun?<a href="/chill.app/register.html">Daftar</a>
                <a href="#"></p>Lupa kata sandi?</a>
            </div>
            <div class="tag-tombol">
                <button type="submit" class="masuk">Masuk</button>
                <p>Atau</p>
                
                
                <button class="google-login"> 
                    <img src="/chill.app/image/google.png" alt="logo-google">
                    <p><a href="google.com">Masuk dengan Google</a></p>
                </button>
                
            </div>
        </form>
        </div>       
    </div>            
</body>
</html>
